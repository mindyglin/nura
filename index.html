function gLvl(x){if(x<=0)return 1;for(const t of LVLS){if(x<=t.maxXP){const r=t.maxXP-t.minXP,lr=t.maxL-t.minL;return Math.min(t.minL+Math.floor(((x-t.minXP)/r)*lr),t.maxL)}}return 100}
function gTier(x){for(const t of LVLS)if(x<=t.maxXP)return t;return LVLS[LVLS.length-1]}
function gProg(x){const t=gTier(x),l=gLvl(x),lr=t.maxL-t.minL;if(!lr)return 1;const xpl=(t.maxXP-t.minXP)/lr,li=l-t.minL;return Math.min((x-(t.minXP+li*xpl))/xpl,1)}
async function sendMagicLink(email){
  if(!sb)throw new Error('Supabase auth is not configured yet.');
  localStorage.setItem(AUTH_EMAIL_KEY,email);
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:AUTH_REDIRECT_URL}});
  if(error)throw error;
}
async function getSession(){

}

}

}

}
async function updatePassword(password){
  if(!sb)throw new Error('Supabase auth is not configured yet.');
  const {error}=await sb.auth.updateUser({password});
  if(error)throw error;
}
async function recoverSessionFromUrl(){
  if(!sb)return null;
  const url=new URL(window.location.href);
  const search=url.searchParams;
  const hash=new URLSearchParams(url.hash.replace(/^#/,''));
  const code=search.get('code');
  const tokenHash=search.get('token_hash');
  const type=search.get('type')||hash.get('type')||'';
  if(code){
    const {data,error}=await sb.auth.exchangeCodeForSession(code);
    if(error)throw error;
    window.history.replaceState({},document.title,AUTH_REDIRECT_URL);
    return data?.session||null;
  }
  if(tokenHash&&type){
    const {data,error}=await sb.auth.verifyOtp({token_hash:tokenHash,type});
    if(error)throw error;
    window.history.replaceState({},document.title,AUTH_REDIRECT_URL);
    return data?.session||null;
  }
  const access_token=hash.get('access_token');
  const refresh_token=hash.get('refresh_token');
  if(access_token&&refresh_token){
    const {data,error}=await sb.auth.setSession({access_token,refresh_token});
    if(error)throw error;
    window.history.replaceState({},document.title,AUTH_REDIRECT_URL);
    return data?.session||null;
  }
  return null;
}

    localStorage.removeItem(`sb-${SUPABASE_PROJECT_REF}-auth-token`);
    localStorage.removeItem(`sb-${SUPABASE_PROJECT_REF}-auth-token-code-verifier`);
  }
  window.history.replaceState({},document.title,AUTH_REDIRECT_URL);
}

  if(error)throw error;
}

const profileBackupKey=key=>`${PROFILE_BACKUP_PREFIX}${String(key||'').trim().toLowerCase()}`;
function sanitizeBackupState(state){
  const payload={...state};
  delete payload.showXPPopup;
  delete payload.lastXPGain;
  return payload;
}
function loadLocalProfileBackup(key){
  if(!key)return null;
  try{
    const raw=localStorage.getItem(profileBackupKey(key));
    return raw?JSON.parse(raw):null;
  }catch{return null;}
}

  if(!user)return null;
  return loadLocalProfileBackup(user.id)||loadLocalProfileBackup(user.email)||null;
}

}
function getRecoveryType(){
  const url=new URL(window.location.href);
  const search=url.searchParams;
  const hash=new URLSearchParams(url.hash.replace(/^#/,''));
  const searchType=search.get('type')||'';
  const hashType=hash.get('type')||'';
  if(search.get('reset')==='1')return 'recovery';
  if(searchType==='recovery'||hashType==='recovery')return 'recovery';
  if(search.get('token_hash')&&((search.get('type')||'')==='recovery'))return 'recovery';
  if(hash.get('access_token')&&hashType==='recovery')return 'recovery';
  return searchType||hashType||'';
}

function buildStarterPlan(focus=[]){
  const chosen=focus.length?focus:['mental','physical'];
  const rotation=[...chosen,...PILLARS.filter(p=>!chosen.includes(p))];
  const cadence=[10,15,20,10,25,15,30];
  return Array.from({length:7},(_,i)=>{
    const pillar=rotation[i%rotation.length];
    const options=DEF_ACTS.filter(a=>a.pillar===pillar);
    const act=options[i%options.length];
    return{
      day:`Day ${i+1}`,
      pillar,
      title:act?.name||PCFG[pillar].name,
      minimum:`${cadence[i]} minutes of ${act?.name?.toLowerCase()||PCFG[pillar].name.toLowerCase()}`,
      stretch:`Pair it with one ${rotation[(i+1)%rotation.length]} reset if you have extra energy`,
      unlock:getUnlockCopy(pillar),
    };
  });
}

function getEncouragement(state){

function calcGlow(logs,streaks){
  const l7=logs.filter(l=>dBtw(td(),l.date)<=7);
  const comp=Math.min(l7.length/14,1)*40,bal=(new Set(l7.map(l=>l.pillar)).size/4)*20;
  const mx=Math.max(...Object.values(streaks).map(s=>s?.current||0),0);
  const str=Math.min(mx/14,1)*20,uniq=new Set(l7.map(l=>l.activityId)).size,vari=Math.min(uniq/8,1)*10;
  const l3=logs.filter(l=>dBtw(td(),l.date)<=3),p3=logs.filter(l=>{const d=dBtw(td(),l.date);return d>3&&d<=6});
  const trend=l3.length>=p3.length?10:(l3.length/Math.max(p3.length,1))*10;
  return Math.round(comp+bal+str+vari+trend);
}
function calcAvState(logs,streaks,gs){
  const l14=logs.filter(l=>dBtw(td(),l.date)<=14);const pc={physical:0,mental:0,intellectual:0,creative:0};
  l14.forEach(l=>{if(pc[l.pillar]!==undefined)pc[l.pillar]++});const mx=14;
  const dates=[...new Set(logs.map(l=>l.date))].sort().reverse();
  const daysAway=dates[0]?Math.max(dBtw(td(),dates[0]),0):0;
  const decay=Math.min(daysAway/7,1);
  const soften=(value,floor=10)=>Math.max(floor,Math.round(value-(value*0.35*decay)));
  return{
    glow:soften(Math.min(gs,100),8),
    posture:soften(Math.min((pc.physical/mx)*100,100),8),
    aura:soften(Math.min((pc.mental/mx)*100,100),6),
    eyes:soften(Math.min((pc.intellectual/mx)*100,100),8),
    saturation:soften(Math.min(gs*1.2,100),10),
    creative:soften(Math.min((pc.creative/mx)*100,100),6),
    decayDays:daysAway,
    decayLevel:decay,
  };
}
function updStreaks(logs,prev){
  const ns={};PILLARS.forEach(p=>{
    const dates=[...new Set(logs.filter(l=>l.pillar===p).map(l=>l.date))].sort().reverse();
    let s=0;const t=td();if(dates.length>0&&(dates[0]===t||dBtw(t,dates[0])===1)){s=1;for(let i=1;i<dates.length;i++){if(dBtw(dates[i-1],dates[i])===1)s++;else break}}
    const pr=prev[p]||{current:0,longest:0};ns[p]={current:s,longest:Math.max(s,pr.longest),lastDate:dates[0]||pr.lastDate};
  });
  const ad=[...new Set(logs.map(l=>l.date))].sort().reverse();
  let ps=0;for(const d of ad){const dp=new Set(logs.filter(l=>l.date===d).map(l=>l.pillar));if(dp.size>=4){if(ps===0&&(d===td()||dBtw(td(),d)===1))ps=1;else if(ps>0)ps++;else break}else if(ps>0)break}
  ns.perfectDay={current:ps,longest:Math.max(ps,(prev.perfectDay||{}).longest||0)};
  let ts=0;for(const d of ad){const dp=new Set(logs.filter(l=>l.date===d).map(l=>l.pillar));if(dp.size>=3){if(ts===0&&(d===td()||dBtw(td(),d)===1))ts=1;else if(ts>0)ts++;else break}else if(ts>0)break}
  ns.tripleThreat={current:ts,longest:Math.max(ts,(prev.tripleThreat||{}).longest||0)};return ns;
}

}

function Calendar({logs,onDayClick}){
  const[mo,setMo]=useState(0);const now=new Date();const vd=new Date(now.getFullYear(),now.getMonth()+mo,1);
  const yr=vd.getFullYear(),mn=vd.getMonth(),fd=new Date(yr,mn,1).getDay(),dim=new Date(yr,mn+1,0).getDate();
  const mName=vd.toLocaleDateString('en-US',{month:'long',year:'numeric'});const tStr=td();
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  return(<div>
    <div className="flex items-center justify-between mb-3">
      <button onClick={()=>setMo(m=>m-1)} className="w-8 h-8 rounded-full bg-surfaceAlt flex items-center justify-center text-inkSoft hover:bg-sageLight text-sm">‹</button>
      <span className="font-heading font-bold text-sm text-ink">{mName}</span>
      <button onClick={()=>mo<0?setMo(m=>m+1):null} className={`w-8 h-8 rounded-full bg-surfaceAlt flex items-center justify-center text-sm ${mo>=0?'opacity-30 cursor-not-allowed':'text-inkSoft hover:bg-sageLight'}`}>›</button>
    </div>
    <div className="grid grid-cols-7 gap-1 text-center">
      {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} className="text-[10px] font-medium text-inkMuted py-1">{d}</div>)}
      {cells.map((day,i)=>{
        if(!day)return<div key={`e${i}`}/>;
        const ds=`${yr}-${String(mn+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dl=logs.filter(l=>l.date===ds);const pls=new Set(dl.map(l=>l.pillar));
        const isT=ds===tStr,isF=parseDate(ds)>parseDate(tStr),hasBg=pls.size>0;
        return(<button key={ds} onClick={()=>!isF&&onDayClick&&onDayClick(ds)}
          className={`relative w-full aspect-square rounded-lg flex flex-col items-center justify-center transition-all text-xs ${isT?'ring-1.5 ring-sage':''} ${isF?'opacity-25':''} ${hasBg?'bg-sageLight/60':'hover:bg-surfaceAlt'}`}>
          <span className={`font-medium ${isT?'text-sage font-bold':'text-ink'}`}>{day}</span>
          {pls.size>0&&<div className="flex gap-0.5 mt-0.5">{PILLARS.map(p=>pls.has(p)?<div key={p} className="w-1.5 h-1.5 rounded-full" style={{background:PCFG[p].color}}/>:null)}</div>}
        </button>);
      })}
    </div>
  </div>);
}

    </div>
  );

function reducer(state,action){
  switch(action.type){
    case 'INIT_USER':return{...state,onboarded:true,user:{name:action.data.name,drinkType:action.data.drinkType,createdAt:td()},depletedPillars:action.data.depletedPillars||['mental','physical'],starterPlan:action.data.starterPlan||buildStarterPlan(action.data.depletedPillars||['mental','physical']),dayIndex:0,currentView:'dashboard',errorMessage:''};
    case 'SET_VIEW':return{...state,currentView:action.view,logPillar:action.logPillar||null};
    case 'SET_DRINK':return{...state,user:{...state.user,drinkType:action.drinkType}};
    case 'CLEAR_ERROR':return{...state,errorMessage:''};
    case 'SET_ERROR':return{...state,errorMessage:action.message||''};
    case 'LOG_ACTIVITY':{
      if(action.log.date>td())return{...state,errorMessage:'Future dates are not allowed. You can only log today or a past date.'};
      const nl=[...state.logs,action.log];const nx=state.xp+action.log.xp;const ns=updStreaks(nl,state.streaks);const ng=calcGlow(nl,ns);const na=calcAvState(nl,ns,ng);
      const tl=nl.filter(l=>l.date===td());const tp=new Set(tl.map(l=>l.pillar));let bx=0;const ptp=new Set(state.logs.filter(l=>l.date===td()).map(l=>l.pillar));
      if(tp.size>=4&&ptp.size<4)bx+=50;else if(tp.size>=3&&ptp.size<3)bx+=25;
      const lev=gLvl(nx+bx);const tot=nl.length;const pc={};PILLARS.forEach(p=>{pc[p]=nl.filter(l=>l.pillar===p).length});
      const cc=state.activities.filter(a=>a.isCustom).length;const w7=nl.filter(l=>dBtw(td(),l.date)<=7);const wv=new Set(w7.map(l=>l.activityId)).size;
      const ck={streaks:ns,level:lev,totalLogs:tot,pc,customCount:cc,weeklyVariety:wv};
      const nAch=[...state.achievements];const newlyUnlocked=[];ACHS.forEach(a=>{if(!nAch.includes(a.id)&&a.ck(ck)){nAch.push(a.id);newlyUnlocked.push(a)}});
      const activeDays=Math.max(new Set(nl.map(l=>l.date)).size-1,0);
      return{...state,logs:nl,xp:nx+bx,streaks:ns,glowScore:ng,avatarState:na,achievements:nAch,lastUnlocked:newlyUnlocked[0]||null,dayIndex:Math.min(activeDays,6),lastXPGain:action.log.xp+bx,showXPPopup:true,errorMessage:''};
    }
    case 'HIDE_XP_POPUP':return{...state,showXPPopup:false};
    case 'ADD_ACTIVITY':if(state.activities.find(a=>a.id===action.activity.id))return state;return{...state,activities:[...state.activities,action.activity]};
    case 'EDIT_ACTIVITY':return{...state,activities:state.activities.map(a=>a.id===action.id?{...a,...action.updates}:a)};
    case 'REMOVE_ACTIVITY':return{...state,activities:state.activities.filter(a=>a.id!==action.id)};
    case 'LOAD_STATE':return{...action.state,showXPPopup:false};
    default:return state;
  }
}

  const[authNotice,setAuthNotice]=useState('');

  const recoveryModeRef=useRef(false);
  const saveTimerRef=useRef(null);
  const[state,dispatch]=useReducer(reducer,INIT_STATE);

  useEffect(()=>{
    let mounted=true;
    const bootFallback=setTimeout(()=>{
      if(mounted)setAuthPhase(current=>current==='loading'?'auth':current);
    },4000);
    (async()=>{
      try{
        if(!AUTH_READY){setAuthPhase('auth');return;}
        const recoveryType=getRecoveryType();
        recoveryModeRef.current=recoveryType==='recovery';
        let recoveredSession=null;
        try{
          recoveredSession=await recoverSessionFromUrl();
        }catch{}
        const {data:{session:storedSession}}=await getSession();
        const session=recoveredSession||storedSession;
        if(!mounted)return;
        if(recoveryModeRef.current&&session?.user){
          setSessionUser(session.user);
          setAuthScreenMode('reset');
          setAuthNotice('Choose a new password to finish resetting your account.');
          setAuthPhase('auth');
          return;
        }
        if(!session?.user){setAuthScreenMode('password');setAuthPhase('auth');return;}
        setSessionUser(session.user);
        localStorage.setItem(AUTH_EMAIL_KEY,session.user.email||'');
        const localBackup=loadBestLocalProfileBackup(session.user);
        try{
          const [remote]=await Promise.all([loadRemoteProfile(session.user.id),wait(900)]);
          if(remote){dispatch({type:'LOAD_STATE',state:{...INIT_STATE,...remote}});setAuthPhase('app')}
          else if(localBackup){dispatch({type:'LOAD_STATE',state:{...INIT_STATE,...localBackup}});setAuthPhase('app')}
          else{setAuthPhase('onboarding')}
        }catch{
          if(localBackup){dispatch({type:'LOAD_STATE',state:{...INIT_STATE,...localBackup}});setAuthPhase('app')}
          else{setAuthPhase('onboarding');}
        }
      }catch{
        if(mounted)setAuthPhase('auth');
      }
    })().finally(()=>clearTimeout(bootFallback));
    const {data:{subscription}}=AUTH_READY?sb.auth.onAuthStateChange(async(event,session)=>{
      const user=session?.user||null;
      if(event==='PASSWORD_RECOVERY')recoveryModeRef.current=true;
      setSessionUser(user);
      if(!user){dispatch({type:'LOAD_STATE',state:INIT_STATE});setAuthScreenMode('password');setAuthPhase('auth');return;}
      if(recoveryModeRef.current||event==='PASSWORD_RECOVERY'){
        recoveryModeRef.current=true;
        setAuthScreenMode('reset');
        setAuthNotice('Choose a new password to finish resetting your account.');
        setAuthPhase('auth');
        return;
      }
      setAuthPhase('loading');
      setLoadingMessage(getLoadingCopy());
      localStorage.setItem(AUTH_EMAIL_KEY,user.email||'');
      const localBackup=loadBestLocalProfileBackup(user);
      try{
        const [remote]=await Promise.all([loadRemoteProfile(user.id),wait(900)]);
        if(remote){dispatch({type:'LOAD_STATE',state:{...INIT_STATE,...remote}});setAuthPhase('app')}
        else if(localBackup){dispatch({type:'LOAD_STATE',state:{...INIT_STATE,...localBackup}});setAuthPhase('app')}
        else{setAuthPhase('onboarding')}
      }catch{
        if(localBackup){dispatch({type:'LOAD_STATE',state:{...INIT_STATE,...localBackup}});setAuthPhase('app')}
        else{setAuthPhase('onboarding');}
      }
    }):{data:{subscription:{unsubscribe(){}}}};
    return()=>{mounted=false;clearTimeout(bootFallback);subscription.unsubscribe();};
  },[]);

  useEffect(()=>{if(state.showXPPopup){const t=setTimeout(()=>dispatch({type:'HIDE_XP_POPUP'}),1500);return()=>clearTimeout(t)}},[state.showXPPopup]);
  useEffect(()=>{
    if(authPhase!=='loading'){setLoadingProgress(100);return;}
    setLoadingProgress(8);
    const timer=setInterval(()=>{
      setLoadingProgress(p=>p>=92?p:Math.min(p+Math.max(3,Math.round((100-p)/6)),92));
    },140);
    return()=>clearInterval(timer);
  },[authPhase]);
  useEffect(()=>{
    if(!showPasswordSavedToast)return;
    const timer=setTimeout(()=>setShowPasswordSavedToast(false),2200);
    return()=>clearTimeout(timer);
  },[showPasswordSavedToast]);
  useEffect(()=>{
    if(authPhase!=='app'||!sessionUser||!state.onboarded)return;
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(()=>{
      saveProfileBackups(sessionUser,state);
      saveRemoteProfile(sessionUser,state).catch(()=>dispatch({type:'SET_ERROR',message:'We could not sync your latest activity to your account yet. It is still saved on this device and will try again on your next session.'}));
    },250);
    return()=>{if(saveTimerRef.current)clearTimeout(saveTimerRef.current);};
  },[state,authPhase,sessionUser]);

  const handleCreateProfile=async(data)=>{
    if(!sessionUser)return;
    const payload={...data,name:data.name.trim()||emailName(sessionUser.email)};
    dispatch({type:'INIT_USER',data:payload});
    const initialState={...INIT_STATE,...reducer(INIT_STATE,{type:'INIT_USER',data:payload})};
    saveProfileBackups(sessionUser,initialState);
    try{
      await saveRemoteProfile(sessionUser,initialState);
    }catch{}
    setAuthPhase('app');
  };

  const handleSavePassword=async()=>{
    try{
      setPasswordError('');
      setPasswordStatus('');
      if(passwordDraft.trim().length<8)return setPasswordError('Use at least 8 characters for your password.');
      if(passwordDraft!==passwordConfirm)return setPasswordError('Your passwords do not match yet.');
      await updatePassword(passwordDraft);
      setPasswordStatus('Password saved!');
      setPasswordDraft('');
      setPasswordConfirm('');
      setShowPasswordModal(false);
      setShowPasswordSavedToast(true);
    }catch(err){
      setPasswordError(err.message||'Unable to save your password right now.');
    }
  };

  const handleResetComplete=async()=>{
    setAuthNotice('Password saved! Please sign in with your new password.');
    setAuthScreenMode('password');
    recoveryModeRef.current=false;
    setPasswordDraft('');
    setPasswordConfirm('');
    setPasswordStatus('');
    setPasswordError('');
    setShowPasswordModal(false);
    setShowPasswordSavedToast(true);
    dispatch({type:'LOAD_STATE',state:INIT_STATE});
    setSessionUser(null);
    setAuthPhase('auth');
    await signOutRemote().catch(()=>{});
  };

  const handleSignOut=()=>{
    setAuthScreenMode('password');
    setAuthNotice('');
    recoveryModeRef.current=false;
    setShowPasswordModal(false);
    setPasswordDraft('');
    setPasswordConfirm('');
    setPasswordStatus('');
    setPasswordError('');
    setShowPasswordSavedToast(false);
    localStorage.removeItem(AUTH_EMAIL_KEY);
    dispatch({type:'LOAD_STATE',state:INIT_STATE});
    setSessionUser(null);
    setAuthPhase('auth');
    signOutRemote().catch(()=>{});
  };

  if(authPhase==='loading')return<div className="min-h-screen bg-bg flex items-center justify-center px-6"><div className="w-full max-w-sm text-center"><div className="text-8xl loading-leaf">🌿</div><p className="mt-5 font-heading text-2xl text-ink">Loading Nura...</p><p className="mt-2 text-sm text-inkMuted">{loadingMessage}</p><div className="mt-6 h-3 w-full overflow-hidden rounded-full bg-borderLight"><div className="h-full rounded-full bg-gradient-to-r from-sage via-sky to-sand transition-all duration-300" style={{width:`${loadingProgress}%`}}/></div><p className="mt-2 text-xs font-mono text-inkMuted">{loadingProgress}%</p></div></div>;
  if(authPhase==='auth')return<AuthGate screenMode={authScreenMode} authNotice={authNotice} onResetComplete={handleResetComplete}/>;
  if(authPhase==='onboarding')return<Onboarding onComplete={handleCreateProfile} onBack={null}/>;

  // Main app
  const views={dashboard:<Dashboard state={state} dispatch={dispatch}/>,log:<LogActivity state={state} dispatch={dispatch} pillar={state.logPillar}/>,stats:<StatsView state={state}/>,achievements:<AchievementsView state={state}/>,activities:<ActivitiesView state={state} dispatch={dispatch}/>};
  const nav=[{id:'dashboard',icon:'⌂',label:'Home'},{id:'stats',icon:'◔',label:'Stats'},{id:'log',icon:'+',label:'Log',accent:true},{id:'achievements',icon:'◆',label:'Awards'},{id:'activities',icon:'≡',label:'Activities'}];

  return(
    <div className="min-h-screen bg-bg">
      <XPPopup xp={state.lastXPGain} visible={state.showXPPopup}/>
      {showPasswordSavedToast&&<div className="fixed top-5 left-1/2 -translate-x-1/2 z-50"><div className="rounded-2xl border border-sage/20 bg-sageLight/95 px-5 py-3 shadow-lg backdrop-blur"><p className="text-sm font-semibold text-sageDark">Password saved!</p></div></div>}
      <Modal open={showDrinkPicker} onClose={()=>setShowDrinkPicker(false)} title="Choose your cup">
        <div className="space-y-4">
          <DrinkCup drinkType={state.user?.drinkType||'matcha'} fillLevel={0.7} size={150}/>
          <DrinkPicker value={state.user?.drinkType||'matcha'} onChange={v=>{dispatch({type:'SET_DRINK',drinkType:v});setShowDrinkPicker(false)}}/>
        </div>
      </Modal>
      <Modal open={showPasswordModal} onClose={()=>setShowPasswordModal(false)} title={passwordModalTitle}>
        <div className="space-y-3">
          <p className="text-sm text-inkSoft">{passwordModalTitle==='Reset your password'?'Choose a new password for your Nura account.':'If this account started with a magic link, you can add a password here once and use email + password from then on.'}</p>
          <input type="password" value={passwordDraft} onChange={e=>setPasswordDraft(e.target.value)} placeholder="New password" className="w-full px-4 py-3.5 rounded-2xl border border-border focus:border-sage focus:ring-2 focus:ring-sage/20 focus:outline-none text-sm bg-surface"/>
          <input type="password" value={passwordConfirm} onChange={e=>setPasswordConfirm(e.target.value)} placeholder="Confirm password" className="w-full px-4 py-3.5 rounded-2xl border border-border focus:border-sage focus:ring-2 focus:ring-sage/20 focus:outline-none text-sm bg-surface"/>
          <div className="grid grid-cols-2 gap-3">
            <Btn onClick={handleSavePassword} className="w-full">Save password</Btn>
            <Btn onClick={()=>setShowPasswordModal(false)} variant="secondary" className="w-full">Not now</Btn>
          </div>
          {passwordStatus&&<Card className="!bg-sageLight/50 !border-sage/20"><p className="text-sm text-sageDark">{passwordStatus}</p></Card>}
          {passwordError&&<Card className="!bg-red-50 !border-red-100"><p className="text-sm text-red-600">{passwordError}</p></Card>}
        </div>
      </Modal>
      {/* Profile switcher bar */}
      <div className="max-w-lg mx-auto px-4 pt-3 flex items-center justify-between gap-2">
        <div className="flex items-center gap-2">
          <button onClick={()=>setShowDrinkPicker(true)} className="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-white/80 border border-border hover:border-sage/30 text-xs text-inkSoft font-medium transition-all">
            <span className="w-6 h-6 rounded-full bg-sage/10 flex items-center justify-center text-[12px]">{(DRINKS.find(d=>d.id===state.user?.drinkType)||DRINKS[0]).emoji}</span>
            Change cup
          </button>
          <button onClick={()=>{setPasswordModalTitle('Set a password');setPasswordStatus('');setPasswordError('');setShowPasswordModal(true);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-white/80 border border-border hover:border-sand/40 text-xs text-inkSoft font-medium transition-all">
            <span className="w-5 h-5 rounded-full bg-sand/20 flex items-center justify-center text-[10px]">🔒</span>
            Set password
          </button>
        </div>
        <button onClick={handleSignOut} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-surfaceAlt hover:bg-sageLight text-xs text-inkSoft font-medium transition-all">
          <span className="w-5 h-5 rounded-full bg-sage/10 flex items-center justify-center text-[10px]">✦</span>
          Sign out
        </button>
      </div>
      <div className="max-w-lg mx-auto px-4 pt-2"><p className="text-[11px] text-inkMuted">{sessionUser?.email}</p></div>
      <div className="max-w-lg mx-auto px-4 pb-24">
        {state.errorMessage&&<Card className="mb-4 !bg-red-50 !border-red-100"><div className="flex items-start justify-between gap-3"><p className="text-sm text-red-600">{state.errorMessage}</p><button onClick={()=>dispatch({type:'CLEAR_ERROR'})} className="text-red-400 text-xs">✕</button></div></Card>}
        {views[state.currentView]||views.dashboard}
      </div>
      <nav className="fixed bottom-0 left-0 right-0 glass-nav z-40">
        <div className="max-w-lg mx-auto flex items-center justify-around py-1.5">
          {nav.map(item=>{const active=state.currentView===item.id;
            if(item.accent)return<button key={item.id} onClick={()=>dispatch({type:'SET_VIEW',view:item.id})} className="w-11 h-11 -mt-4 rounded-full bg-sage text-white flex items-center justify-center text-xl font-light active:scale-95 transition-transform shadow-md shadow-sage/30">{item.icon}</button>;
            return<button key={item.id} onClick={()=>dispatch({type:'SET_VIEW',view:item.id})} className={`flex flex-col items-center gap-0.5 px-3 py-1 transition-all ${active?'nav-active':''}`}><span className={`text-base ${active?'text-sage':'text-inkMuted'}`}>{item.icon}</span><span className={`text-[9px] font-medium ${active?'text-sage':'text-inkMuted'}`}>{item.label}</span></button>;
          })}
        </div>
        <div className="h-[env(safe-area-inset-bottom)]"/>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
